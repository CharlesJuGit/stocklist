name: Update NQ Data

on:
  schedule:
    - cron: '30 22 * * 0-5'  # 22:30 UTC = 6:30 AM TWN（週一到週六）；週五UTC=週六6:30TWN收尾班，補NQ週五時段收在台灣週六清晨5:00的缺口（P2-8）
  workflow_dispatch:

# 與 fetch-taifex 共用同一 group，避免兩個 workflow 同時推送 taifex_data.json 撞車（排隊不取消）
concurrency:
  group: taifex-data-push
  cancel-in-progress: false

jobs:
  update-nq:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update NQ OHLC
        run: |
          python fetch_nq_only.py || echo "fetch_nq_only.py exited with error, continuing anyway"

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add taifex_data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update NQ data [skip ci]"
          for i in 1 2 3; do
            git push origin main && echo "Push OK" && exit 0
            echo "Push failed (attempt $i), pulling and retrying..."
            git pull --rebase -X theirs origin main
          done
          echo "All push attempts failed"
          exit 1
