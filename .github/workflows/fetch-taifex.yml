name: Fetch TAIFEX Data

on:
  schedule:
    # 每個交易日 17:00 台灣時間（= 09:00 UTC）自動執行
    - cron: '0 9 * * 1-5'
  workflow_dispatch:   # 也可手動觸發

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch TAIFEX data
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python3 fetch_taifex.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add taifex_data.json
          git diff --staged --quiet || git commit -m "chore: update TAIFEX data"
          git push
