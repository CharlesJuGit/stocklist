name: Fetch TAIFEX Data

on:
  schedule:
    - cron: '0 9 * * 1-5'   # 17:00 TWN
    - cron: '0 10 * * 1-5'  # 18:00 TWN
    - cron: '0 12 * * 1-5'  # 20:00 TWN
  workflow_dispatch:

# 與 update-nq 共用同一 group，避免兩個 workflow 同時推送 taifex_data.json 撞車（排隊不取消）
concurrency:
  group: taifex-data-push
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch TAIFEX data
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: |
          python fetch_taifex.py || echo "fetch_taifex.py exited with error, continuing anyway"

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add taifex_data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update TAIFEX data [skip ci]"
          for i in 1 2 3; do
            git push origin main && echo "Push OK" && exit 0
            echo "Push failed (attempt $i), pulling and retrying..."
            git pull --rebase -X theirs origin main
          done
          echo "All push attempts failed"
          exit 1
