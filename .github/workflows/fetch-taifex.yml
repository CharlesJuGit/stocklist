name: Fetch TAIFEX Data

on:
  schedule:
    # 避開整點 :00（GitHub 排程尖峰最易被跳過）
    - cron: '33 8 * * 1-5'   # 16:33 TWN（下午三大法人/期貨出爐後首抓，能否準時觸發以網頁「更新紀錄」觀察）
    - cron: '17 9 * * 1-5'   # 17:17 TWN
    - cron: '17 10 * * 1-5'  # 18:17 TWN
    - cron: '17 12 * * 1-5'  # 20:17 TWN
    - cron: '17 13 * * 1-5'  # 21:17 TWN（保險：前面若全被跳過仍能補上當日資料）
    # 2026-07-04 實驗班次（review P2-6 更正）：Ball 的延遲補償構想——中午提早排，
    # 靠 GitHub +2~3h 延遲讓實際落點落在 15~16 點左右（期指三大法人出爐後）。
    # 此二時間台股盤中/剛收，落點太早只會抓到前一日資料；資料不會壞（merge 只在新值才覆蓋），純觀察落點。
    # 取代原 20:00/21:00 UTC 整點對照班（dcfdf29 誤植；該對照題已有初步結論：12:17 UTC 最穩）
    - cron: '7 4 * * 1-5'    # 12:07 TWN（實驗：延遲補償落點）
    - cron: '7 5 * * 1-5'    # 13:07 TWN（實驗：延遲補償落點）
  workflow_dispatch:

# 與 update-nq 共用同一 group，避免兩個 workflow 同時推送 taifex_data.json 撞車（排隊不取消）
concurrency:
  group: taifex-data-push
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch TAIFEX data
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          TRIGGER_TYPE: ${{ github.event_name }}
          ALPHAVANTAGE_KEY: ${{ secrets.ALPHAVANTAGE_KEY }}
        run: |
          python fetch_taifex.py || echo "fetch_taifex.py exited with error, continuing anyway"

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add taifex_data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update TAIFEX data [skip ci]"
          for i in 1 2 3; do
            git push origin main && echo "Push OK" && exit 0
            echo "Push failed (attempt $i), pulling and retrying..."
            git pull --rebase -X theirs origin main
          done
          echo "All push attempts failed"
          exit 1
